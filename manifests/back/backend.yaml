apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-sa
  namespace: sample-app
  annotations:
    # 💡 주의: 이 부분은 ECR 주소가 아니라 생성하신 'IAM Role ARN'이 들어가야 정상 작동합니다.
    eks.amazonaws.com/role-arn: arn:aws:iam::624480629666:role/sample-app-eks-cluster-role-hong
---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: sample-app
type: Opaque
stringData:
  S3_BUCKET_NAME: "sample-app-dev-files-624480629666-hjh"
  DB_URL: "jdbc:mysql://sample-app-mysql.cpa22giccvz5.ap-northeast-2.rds.amazonaws.com:3306/mydb?serverTimezone=Asia/Seoul&characterEncoding=UTF-8"
  DB_USERNAME: "admin"
  DB_PASSWORD: "hong1234"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: sample-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      serviceAccountName: backend-sa
      containers:
        - name: backend
          # 💡 배포 시 GitHub Actions가 이 줄의 :latest 부분을 실제 태그로 바꿔줄 것입니다.
          image: 624480629666.dkr.ecr.ap-northeast-2.amazonaws.com/sample-app/backend:07a104266a9a71d7db6d24a323d30dae92cdfb8d
          ports:
            - containerPort: 8080
          env:
            # S3 설정
            - name: S3_BUCKET_NAME
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: S3_BUCKET_NAME
            # DB 설정 (Spring Boot 표준 환경변수명으로 매핑)
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: DB_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: DB_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: DB_PASSWORD
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: sample-app
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080